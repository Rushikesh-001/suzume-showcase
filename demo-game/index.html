<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">


<style>
/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 99999;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(10,10,30,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,195,80,0.3);
    border-radius: 25px;
    color: #ffc350;
    text-decoration: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.home-btn:hover {
    background: rgba(255,195,80,0.15);
    border-color: #ffc350;
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(255,195,80,0.2);
}
.home-btn svg {
    width: 18px;
    height: 18px;
}
@media (max-width: 768px) {
    .home-btn {
        top: 10px;
        left: 10px;
        padding: 6px 12px;
        font-size: 12px;
    }
    .home-btn span {
        display: none;
    }
}
</style>
</head>
<body>
  <div id="game-wrapper">
    <div id="header">
      <div class="score-box">
        <span class="label">SCORE</span>
        <span id="score" class="value">0</span>
      </div>
      <h1>SNAKE</h1>
      <div class="score-box">
        <span class="label">BEST</span>
        <span id="highScore" class="value">0</span>
      </div>
    </div>
    <div id="canvas-container">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="overlay">
        <p id="overlay-title">Press <kbd>SPACE</kbd> to start</p>
        <p id="overlay-sub"></p>
      </div>
    </div>
    <div id="controls-hint">
      Arrow Keys / WASD &middot; P/Esc to pause
    </div>
  </div>
  <script src="main.js"></script>
<!-- HOME BUTTON -->
<a href="../" class="home-btn" title="Back to Suzume Showcase">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
  <span>Home</span>
</a>
</body>
</html>

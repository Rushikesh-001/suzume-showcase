<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suzume — 3D Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">


<style>
/* HOME BUTTON */
.home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 99999;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: rgba(10,10,30,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,195,80,0.3);
    border-radius: 25px;
    color: #ffc350;
    text-decoration: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.home-btn:hover {
    background: rgba(255,195,80,0.15);
    border-color: #ffc350;
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(255,195,80,0.2);
}
.home-btn svg {
    width: 18px;
    height: 18px;
}
@media (max-width: 768px) {
    .home-btn {
        top: 10px;
        left: 10px;
        padding: 6px 12px;
        font-size: 12px;
    }
    .home-btn span {
        display: none;
    }
}
</style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="loader-ring"></div>
    <h1>✦ SUZUME</h1>
    <p>Loading 3D Experience...</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- UI Overlay -->
  <div class="ui-overlay" id="uiOverlay">
    <div class="ui-top">
      <span class="ui-badge">✦ 3D EXPERIENCE</span>
      <div class="ui-nav-hint">← → ARROWS  ·  DRAG TO ROTATE  ·  SCROLL TO ZOOM</div>
    </div>

    <div class="ui-center">
      <h2 class="scene-title" id="sceneTitle">Suzume</h2>
      <p class="scene-desc" id="sceneDesc">Supreme AI Companion</p>
    </div>

    <div class="ui-bottom">
      <button class="nav-btn" id="prevBtn">◀</button>
      <div class="dot-container" id="dotContainer"></div>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>

    <div class="ui-corner">
      <a href="../index.html" class="back-link">← Back to Showreel</a>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
<!-- HOME BUTTON -->
<a href="../" class="home-btn" title="Back to Suzume Showcase">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
  <span>Home</span>
</a>
</body>
</html>

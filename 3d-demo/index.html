<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzume — 3D Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #07070F;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }

    /* ─── Loading Screen ─── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #07070F;
      transition: opacity 0.8s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #6C3AFF, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }
    .loader-bar {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar-inner {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #6C3AFF, #3B82F6);
      animation: loadBar 2s ease-in-out forwards;
    }
    @keyframes loadBar { to { width: 100%; } }

    /* ─── UI Overlay ─── */
    #ui-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    #ui-overlay > * { pointer-events: auto; }

    .ui-header {
      position: absolute;
      top: 30px;
      left: 0; right: 0;
      text-align: center;
    }
    .ui-header h2 {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #6C3AFF, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ui-info {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .ui-info.visible { opacity: 1; }
    .ui-info h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .ui-info p {
      font-size: 0.9rem;
      color: #9090B0;
      max-width: 500px;
    }
    .ui-info .key-hint {
      font-size: 0.7rem;
      color: #606080;
      margin-top: 12px;
      font-family: 'Orbitron', monospace;
      letter-spacing: 2px;
    }

    .ui-nav {
      position: absolute;
      bottom: 40px;
      right: 40px;
      display: flex;
      gap: 10px;
    }
    .ui-nav button {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .ui-nav button:hover {
      border-color: #6C3AFF;
      background: rgba(108,58,255,0.15);
    }

    .ui-dots {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ui-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .ui-dot.active { background: #6C3AFF; box-shadow: 0 0 12px rgba(108,58,255,0.5); transform: scale(1.3); }

    .ui-cta {
      position: absolute;
      bottom: 40px;
      left: 40px;
    }
    .ui-cta a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      color: #9090B0;
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .ui-cta a:hover {
      border-color: #6C3AFF;
      color: #fff;
    }

    @media (max-width: 768px) {
      .ui-nav { bottom: 20px; right: 20px; }
      .ui-nav button { width: 36px; height: 36px; font-size: 1rem; }
      .ui-dots { right: 16px; gap: 10px; }
      .ui-info { bottom: 80px; padding: 0 24px; }
      .ui-info h3 { font-size: 1.1rem; }
      .ui-info p { font-size: 0.8rem; }
      .ui-cta { display: none; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <h1>✦ SUZUME</h1>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div class="ui-header"><h2>✦ 3D EXPERIENCE</h2></div>

    <div class="ui-info visible" id="sceneInfo">
      <h3 id="infoTitle">Suzume</h3>
      <p id="infoDesc">Supreme AI Companion — Full-Stack Architect, Game Developer, System Automation Force</p>
      <div class="key-hint">← → ARROWS TO NAVIGATE  •  DRAG TO ROTATE  •  SCROLL TO ZOOM</div>
    </div>

    <div class="ui-nav">
      <button id="prevBtn" title="Previous">◀</button>
      <button id="nextBtn" title="Next">▶</button>
    </div>

    <div class="ui-dots" id="dotContainer"></div>

    <div class="ui-cta">
      <a href="../">← Back to Showreel</a>
    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ════════════════════════════════════════
    // SCENE DATA — Each scene is a 3D exhibit
    // ════════════════════════════════════════
    const scenes = [
      {
        title: "Suzume",
        desc: "Supreme AI Companion — Full-Stack Architect, Game Developer, System Automation Force",
        color1: 0x6C3AFF, color2: 0x3B82F6
      },
      {
        title: "Full-Stack Web",
        desc: "React • Next.js • Node.js • Databases • APIs — Complete platforms from scratch",
        color1: 0xF59E0B, color2: 0xEF4444
      },
      {
        title: "Game Development",
        desc: "Unity • C# • 3D/2D Games • Physics • Animation — Interactive experiences",
        color1: 0x10B981, color2: 0x059669
      },
      {
        title: "System Automation",
        desc: "PowerShell • Bash • Registry • Firewall • Processes — Full OS control",
        color1: 0xEC4899, color2: 0xDB2777
      },
      {
        title: "Data & ML",
        desc: "Python • Pandas • Web Scraping • ML Models • File Generation",
        color1: 0x3B82F6, color2: 0x2563EB
      },
      {
        title: "UI/UX & Design",
        desc: "CSS • Canvas • Particles • 3D Transforms • Animations • Responsive",
        color1: 0x8B5CF6, color2: 0x6C3AFF
      },
      {
        title: "7 Specialist Agents",
        desc: "worker-js • worker-python • worker-unity • worker-sys • worker-web • builder • reviewer",
        color1: 0x06B6D4, color2: 0x0891B2
      }
    ];

    let currentScene = 0;

    // ════════════════════════════════════════
    // THREE.JS SETUP
    // ════════════════════════════════════════
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.prepend(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 4;
    controls.maxDistance = 20;
    controls.target.set(0, 1, 0);

    // ════════════════════════════════════════
    // LIGHTS
    // ════════════════════════════════════════
    const ambientLight = new THREE.AmbientLight(0x222244, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x6C3AFF, 0.3);
    fillLight.position.set(-5, 0, 5);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x3B82F6, 0.4);
    rimLight.position.set(0, -5, -5);
    scene.add(rimLight);

    // Point light that follows the primary object
    const pointLight = new THREE.PointLight(0x6C3AFF, 0.5, 15);
    pointLight.position.set(0, 2, 4);
    scene.add(pointLight);

    // ════════════════════════════════════════
    // PARTICLE SYSTEM (Background)
    // ════════════════════════════════════════
    const particleCount = 1500;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 40;
      positions[i*3+1] = (Math.random() - 0.5) * 20;
      positions[i*3+2] = (Math.random() - 0.5) * 40 - 10;

      const c = new THREE.Color().setHSL(0.7 + Math.random() * 0.15, 0.6, 0.4 + Math.random() * 0.3);
      colors[i*3] = c.r;
      colors[i*3+1] = c.g;
      colors[i*3+2] = c.b;

      sizes[i] = Math.random() * 3 + 1;
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particleMat = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particleSystem = new THREE.Points(particleGeo, particleMat);
    scene.add(particleSystem);

    // ════════════════════════════════════════
    // GROUND / GRID
    // ════════════════════════════════════════
    const gridHelper = new THREE.GridHelper(20, 20, 0x6C3AFF, 0x3B82F6);
    gridHelper.position.y = -0.5;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.15;
    scene.add(gridHelper);

    // Reflective ground plane
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x07070F,
      roughness: 0.8,
      metalness: 0.2,
      transparent: true,
      opacity: 0.5,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // ════════════════════════════════════════
    // MAIN 3D OBJECTS (Per Scene)
    // ════════════════════════════════════════
    let mainGroup = new THREE.Group();
    scene.add(mainGroup);

    function buildScene(index) {
      // Clear old objects
      while(mainGroup.children.length > 0) {
        const child = mainGroup.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
        mainGroup.remove(child);
      }

      const data = scenes[index];
      const col1 = new THREE.Color(data.color1);
      const col2 = new THREE.Color(data.color2);

      // Central Torus Knot (the hero object)
      const knotGeo = new THREE.TorusKnotGeometry(1.2, 0.4, 128, 16);
      const knotMat = new THREE.MeshPhysicalMaterial({
        color: data.color1,
        emissive: data.color2,
        emissiveIntensity: 0.15,
        metalness: 0.7,
        roughness: 0.2,
        clearcoat: 0.3,
        clearcoatRoughness: 0.4,
        transparent: true,
        opacity: 0.95,
      });
      const knot = new THREE.Mesh(knotGeo, knotMat);
      knot.position.y = 1.5;
      knot.castShadow = true;
      mainGroup.add(knot);

      // Inner ring
      const ringGeo = new THREE.TorusGeometry(1.6, 0.05, 32, 64);
      const ringMat = new THREE.MeshPhysicalMaterial({
        color: data.color2,
        emissive: data.color1,
        emissiveIntensity: 0.2,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.6,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.y = 1.5;
      ring.rotation.x = Math.PI / 2;
      mainGroup.add(ring);

      // Orbiting small spheres
      const orbCount = 8;
      for (let i = 0; i < orbCount; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const sphereMat = new THREE.MeshPhysicalMaterial({
          color: data.color1,
          emissive: data.color2,
          emissiveIntensity: 0.3,
          metalness: 0.5,
          roughness: 0.3,
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        const angle = (i / orbCount) * Math.PI * 2;
        sphere.position.set(
          Math.cos(angle) * 2.2,
          1.5 + Math.sin(angle * 2) * 0.3,
          Math.sin(angle) * 2.2
        );
        sphere.userData = { angle, speed: 0.5 + Math.random() * 0.5, radius: 2.2, baseY: 1.5 };
        mainGroup.add(sphere);
      }

      // Floating particles around the object
      const glowParticlesGeo = new THREE.BufferGeometry();
      const gpCount = 200;
      const gpPos = new Float32Array(gpCount * 3);
      for (let i = 0; i < gpCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 2;
        const r = 2 + Math.random() * 3;
        gpPos[i*3] = Math.sin(theta) * Math.cos(phi) * r;
        gpPos[i*3+1] = 1.5 + Math.sin(theta) * Math.sin(phi) * r;
        gpPos[i*3+2] = Math.cos(theta) * r;
      }
      glowParticlesGeo.setAttribute('position', new THREE.BufferAttribute(gpPos, 3));
      const gpMat = new THREE.PointsMaterial({
        size: 0.04,
        color: data.color1,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const gpSystem = new THREE.Points(glowParticlesGeo, gpMat);
      gpSystem.userData = { isGlow: true };
      mainGroup.add(gpSystem);

      // Update UI
      document.getElementById('infoTitle').textContent = data.title;
      document.getElementById('infoDesc').textContent = data.desc;
      updateDots(index);

      // Animate entrance
      mainGroup.scale.set(0.01, 0.01, 0.01);
      mainGroup.rotation.y = 0;
      animateEntrance();
    }

    function animateEntrance() {
      const target = { scale: 1 };
      const start = performance.now();
      const duration = 1200;

      function easeOutBack(t) {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }

      function animate(time) {
        const elapsed = time - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeOutBack(progress);
        mainGroup.scale.set(eased, eased, eased);
        if (progress < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    // ════════════════════════════════════════
    // NAVIGATION
    // ════════════════════════════════════════
    function goToScene(index) {
      if (index < 0 || index >= scenes.length) return;
      currentScene = index;
      buildScene(index);
      // Reset camera orbit
      controls.target.set(0, 1, 0);
    }

    function nextScene() { goToScene((currentScene + 1) % scenes.length); }
    function prevScene() { goToScene((currentScene - 1 + scenes.length) % scenes.length); }

    document.getElementById('nextBtn').addEventListener('click', nextScene);
    document.getElementById('prevBtn').addEventListener('click', prevScene);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') { e.preventDefault(); nextScene(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prevScene(); }
    });

    // Dots
    function updateDots(active) {
      const container = document.getElementById('dotContainer');
      container.innerHTML = '';
      scenes.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'ui-dot' + (i === active ? ' active' : '');
        dot.addEventListener('click', () => goToScene(i));
        container.appendChild(dot);
      });
    }

    // ════════════════════════════════════════
    // ANIMATION LOOP
    // ════════════════════════════════════════
    const clock = new THREE.Clock();

    function animate() {
      const t = clock.getElapsedTime();

      // Rotate main group slowly
      mainGroup.rotation.y += 0.003;
      mainGroup.children.forEach(child => {
        if (child.userData && child.userData.angle !== undefined) {
          const data = child.userData;
          data.angle += 0.01 * data.speed;
          child.position.x = Math.cos(data.angle) * data.radius;
          child.position.z = Math.sin(data.angle) * data.radius;
          child.position.y = data.baseY + Math.sin(t * data.speed + data.angle) * 0.2;
        }
        if (child.userData && child.userData.isGlow) {
          child.rotation.y += 0.001;
          child.rotation.x += 0.0005;
        }
      });

      // Float the main knot
      const knot = mainGroup.children[0];
      if (knot && knot.geometry && knot.geometry.type === 'TorusKnotGeometry') {
        knot.position.y = 1.5 + Math.sin(t * 0.5) * 0.1;
        knot.rotation.x += 0.005;
        knot.rotation.z += 0.003;
      }

      // Ring rotation
      const ring = mainGroup.children[1];
      if (ring && ring.geometry && ring.geometry.type === 'TorusGeometry') {
        ring.rotation.z = t * 0.3;
      }

      // Particle system slow rotation
      particleSystem.rotation.y += 0.0003;

      // Pulsing point light
      pointLight.intensity = 0.4 + Math.sin(t * 0.8) * 0.15;

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    // ════════════════════════════════════════
    // RESIZE
    // ════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ════════════════════════════════════════
    // INIT
    // ════════════════════════════════════════
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      buildScene(0);
      animate();
    }, 2200);
  </script>
</body>
</html>
